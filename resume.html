<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杨钟杰 — 技术专家 / 基础设施架构师</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #07080a;
    --bg1: #0b0d10;
    --stroke: rgba(255,255,255,0.08);
    --text: rgba(255,255,255,0.92);
    --muted: rgba(255,255,255,0.66);
    --muted2: rgba(255,255,255,0.48);
    --red: #ff2a2a;
    --red2: #ff4d4d;
    --redGlow: rgba(255,42,42,0.30);
    --redGlow2: rgba(255,42,42,0.12);
    --radius: 16px;
    --font-display: "Orbitron", system-ui, sans-serif;
    --font-body: "Noto Sans SC", system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    color: var(--text);
    background:
      radial-gradient(900px 600px at 20% 10%, rgba(255,42,42,0.18), transparent 55%),
      radial-gradient(800px 500px at 80% 30%, rgba(255,75,75,0.08), transparent 60%),
      radial-gradient(900px 700px at 50% 90%, rgba(255,42,42,0.06), transparent 60%),
      linear-gradient(180deg, var(--bg0), var(--bg1) 55%, #050507);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.7;
    letter-spacing: 0.2px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 28px 18px;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.25;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 52px 52px;
    mask-image: radial-gradient(circle at 50% 30%, rgba(0,0,0,1), rgba(0,0,0,0.3) 55%, rgba(0,0,0,0) 76%);
    z-index: 0;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.10;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0) 0px,
      rgba(255,255,255,0) 2px,
      rgba(255,42,42,0.04) 3px,
      rgba(255,255,255,0) 6px
    );
  }

  /* ============ ACCESS GATE ============ */
  #access-gate {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;
    gap: 20px;
    z-index: 1;
  }
  #access-gate.hidden { display: none; }

  .gate-card {
    border: 1px solid var(--stroke);
    background: radial-gradient(140% 160% at 0% 0%, var(--redGlow2), rgba(255,255,255,0.02) 55%), rgba(0,0,0,0.30);
    border-radius: var(--radius);
    padding: 36px 32px;
    max-width: 400px;
    width: calc(100% - 40px);
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.50);
  }
  .gate-card .gate-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.8;
  }
  .gate-card h2 {
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: 1px;
    color: #fff;
    margin-bottom: 8px;
  }
  .gate-card p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .gate-card .gate-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--stroke);
    background: rgba(0,0,0,0.50);
    color: #fff;
    font-family: var(--font-body);
    font-size: 14px;
    text-align: center;
    letter-spacing: 2px;
    outline: none;
    transition: border-color 160ms;
  }
  .gate-card .gate-input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px var(--redGlow2);
  }
  .gate-card .gate-btn {
    margin-top: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 40px;
    padding: 0 28px;
    border-radius: 999px;
    border: 1px solid rgba(255,42,42,0.55);
    background: radial-gradient(130% 150% at 20% 0%, rgba(255,42,42,0.35), rgba(255,255,255,0.02) 60%), rgba(0,0,0,0.22);
    color: rgba(255,255,255,0.92);
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 0.8px;
    cursor: pointer;
    transition: box-shadow 160ms;
  }
  .gate-card .gate-btn:hover {
    border-color: rgba(255,42,42,0.75);
    box-shadow: 0 0 18px var(--redGlow);
  }
  .gate-error {
    font-size: 12px;
    color: var(--red2);
    min-height: 18px;
    margin-top: 8px;
  }

  .gate-spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ============ INJECTED CONTENT CONTAINER ============ */
  #resume-content {
    position: relative;
    z-index: 1;
    width: 100%;
    display: none;
  }
  #resume-content.visible { display: block; }

  @media print {
    body { background: #07080a !important; padding: 0; }
    body::before, body::after { display: none; }
    #access-gate { display: none !important; }
    @page { margin: 0; size: A4; }
  }
</style>
</head>
<body>

<div id="access-gate">
  <div class="gate-card">
    <div class="gate-icon">&#x1F512;</div>
    <h2>Access Restricted</h2>
    <p>此页面需要授权访问。请输入访问密钥后继续。</p>
    <input type="password" class="gate-input" id="gate-token-input" placeholder="请输入访问密钥" autocomplete="off" />
    <div class="gate-error" id="gate-error"></div>
    <button class="gate-btn" id="gate-btn" onclick="_gateVerify()">确 认</button>
  </div>
</div>

<div id="resume-content"></div>

<script>
// SHA-256 hash of the correct token — plaintext token never appears in source.
var TOKEN_HASH = "bd561dc51814411df41b1c56fa1d7b702a5d60cfbdaa28a1f78842f31cdbaa19";

function bufferToHex(buffer) {
  return Array.prototype.map.call(new Uint8Array(buffer), function(b) {
    return ("00" + b.toString(16)).slice(-2);
  }).join("");
}

function sha256(str) {
  return window.crypto.subtle.digest("SHA-256", new TextEncoder().encode(str)).then(bufferToHex);
}

function setGateBusy(busy) {
  var btn = document.getElementById("gate-btn");
  if (busy) {
    btn.disabled = true;
    btn.innerHTML = '<span class="gate-spinner"></span>加载中...';
  } else {
    btn.disabled = false;
    btn.innerHTML = '确 认';
  }
}

function showError(msg) {
  document.getElementById("gate-error").textContent = msg;
}

// Fetch & inject resume content from the serverless API
function fetchResume(token) {
  setGateBusy(true);
  fetch("/api/verify", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token: token })
  })
  .then(function(res) {
    if (!res.ok) {
      throw new Error("unauthorized");
    }
    return res.text();
  })
  .then(function(html) {
    document.getElementById("resume-content").innerHTML = html;
    document.getElementById("resume-content").classList.add("visible");

    var styleTag = document.getElementById("resume-content").querySelector("style");
    if (styleTag) {
      document.head.appendChild(styleTag.cloneNode(true));
    }

    document.getElementById("access-gate").classList.add("hidden");
    document.body.style.padding = "28px 18px";
    document.body.style.display = "";
    // Cache decrypted HTML in session so refresh doesn't need re-auth
    sessionStorage.setItem("_resume_html", html);
    sessionStorage.setItem("_resume_granted", "1");
  })
  .catch(function() {
    showError("密钥不正确，或服务暂时不可用");
    setGateBusy(false);
    sessionStorage.removeItem("_resume_hash");
    var input = document.getElementById("gate-token-input");
    input.value = "";
    input.focus();
  });
}

(function() {
  var params = new URLSearchParams(window.location.search);
  var urlToken = params.get("token");
  var cachedHtml = sessionStorage.getItem("_resume_html");
  var alreadyGranted = sessionStorage.getItem("_resume_granted");

  // Session already granted — restore from cache (no API call needed)
  if (alreadyGranted === "1" && cachedHtml) {
    document.getElementById("resume-content").innerHTML = cachedHtml;
    document.getElementById("resume-content").classList.add("visible");
    var styleTag = document.getElementById("resume-content").querySelector("style");
    if (styleTag) document.head.appendChild(styleTag.cloneNode(true));
    document.getElementById("access-gate").classList.add("hidden");
    document.body.style.padding = "28px 18px";
    document.body.style.display = "";
    return;
  }

  // Check URL token
  if (urlToken) {
    sha256(urlToken).then(function(hash) {
      if (hash === TOKEN_HASH) {
        // Clean URL then fetch
        window.history.replaceState(null, "", window.location.pathname);
        fetchResume(urlToken);
      } else {
        document.getElementById("access-gate").classList.remove("hidden");
        showError("密钥不正确");
      }
    });
  } else {
    document.getElementById("access-gate").classList.remove("hidden");
  }

  window._gateVerify = function() {
    var input = document.getElementById("gate-token-input");
    var val = input.value.trim();
    if (!val) { showError("请输入访问密钥"); return; }
    sha256(val).then(function(hash) {
      if (hash === TOKEN_HASH) {
        fetchResume(val);
      } else {
        showError("密钥不正确，请重试");
        input.value = "";
        input.focus();
      }
    });
  };

  document.addEventListener("DOMContentLoaded", function() {
    var input = document.getElementById("gate-token-input");
    if (input) {
      input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") window._gateVerify();
      });
    }
  });
})();
</script>

</body>
</html>
